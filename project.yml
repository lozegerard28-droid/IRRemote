name: IRRemote
options:
  bundleIdPrefix: com.irremote
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"

settings:
  SWIFT_VERSION: "5.9"
  TARGETED_DEVICE_FAMILY: "1,2"
  INFOPLIST_FILE: Resources/Info.plist
  PRODUCT_BUNDLE_IDENTIFIER: com.irremote.app

targets:
  IRRemote:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - Models
      - Services
      - ViewModels
      - Views
      - Resources
    info:
      path: Resources/Info.plist
    entitlements:
      path: Resources/Entitlements.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.irremote.app
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Apple Development"
    dependencies: []

name: Build IRRemote IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: IRRemote

      - name: Setup Xcode
        run: |
          ls /Applications | grep -i xcode
          XCODE_APP=$(ls -d /Applications/Xcode*.app 2>/dev/null | head -1)
          echo "Found Xcode: $XCODE_APP"
          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          fi
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || echo "No iOS SDK found yet"

      - name: Install XcodeGen
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen 2>&1

      - name: Install iOS simulator runtime
        run: |
          xcrun simctl list > /dev/null
          xcodebuild -downloadPlatform iOS 2>&1 || echo "Download failed, trying alternative..."
          xcrun simctl runtime list 2>&1

      - name: Generate Xcode project
        run: |
          cd IRRemote
          xcodegen generate --spec project_V2.yml 2>&1
          ls -la *.xcodeproj

      - name: Build (unsigned)
        run: |
          set -o pipefail
          cd IRRemote
          PROJ=$(ls -d *.xcodeproj 2>/dev/null | head -1)
          echo "Project: $PROJ"
          SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          echo "SDK: $SDK"
          xcodebuild clean build \
            -project "$PROJ" \
            -scheme IRRemote \
            -configuration Release \
            -derivedDataPath build/derived \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== xcodebuild EXIT CODE: $EXIT_CODE ==="
          echo "=== LAST 80 LINES OF BUILD LOG ==="
          tail -80 build.log
          if [ "$EXIT_CODE" -ne 0 ]; then exit $EXIT_CODE; fi

      - name: Package IPA
        run: |
          cd IRRemote
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          echo "App: $APP_PATH"
          if [ -z "$APP_PATH" ]; then echo "ERROR: No .app found!"; exit 1; fi
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../IRRemote.ipa Payload/
          echo "IPA size: $(wc -c < ../IRRemote.ipa) bytes"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IRRemote.ipa
          path: IRRemote/build/IRRemote.ipa
          if-no-files-found: error

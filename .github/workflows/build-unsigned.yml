name: Build IRRemote IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: IRRemote

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen 2>&1

      - name: Generate Xcode project
        run: |
          cd IRRemote
          xcodegen generate --spec project_V2.yml 2>&1
          ls -la *.xcodeproj

      - name: Build (unsigned)
        run: |
          set -x
          cd IRRemote
          PROJ=$(ls -d *.xcodeproj 2>/dev/null | head -1)
          echo "Project: $PROJ"
          xcodebuild clean build -project "$PROJ" \
            -scheme IRRemote \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/derived \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log
          echo "=== xcodebuild EXIT CODE: $? ==="
          echo "=== LAST 80 LINES OF BUILD LOG ==="
          tail -80 build.log

      - name: Package IPA
        run: |
          cd IRRemote
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          echo "App: $APP_PATH"
          if [ -z "$APP_PATH" ]; then echo "ERROR: No .app found!"; exit 1; fi
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../IRRemote.ipa Payload/
          echo "IPA size: $(wc -c < ../IRRemote.ipa) bytes"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IRRemote.ipa
          path: IRRemote/build/IRRemote.ipa
          if-no-files-found: error

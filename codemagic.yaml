workflows:
  build-ipa:
    name: Build IRRemote IPA
    environment:
      xcode: "16.0"
      vars:
        XCODE_SCHEME: IRRemote
        BUNDLE_ID: com.irremote.app
    scripts:
      - name: Install xcodegen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate --spec project_V2.yml
      - name: Build IPA
        script: |
          xcodebuild build -project IRRemote.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath $CM_BUILD_DIR/build/derived \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
          mkdir -p $CM_BUILD_DIR/build/ipa/Payload
          cp -r $CM_BUILD_DIR/build/derived/Build/Products/Release-iphoneos/IRRemote.app $CM_BUILD_DIR/build/ipa/Payload/
          cd $CM_BUILD_DIR/build/ipa
          zip -r $CM_BUILD_DIR/build/IRRemote.ipa Payload/
    artifacts:
      - build/IRRemote.ipa
